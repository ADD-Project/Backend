spring:
  profiles:
    active: local

---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:sqlite:C:\db/test.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1

  servlet:
    multipart:
      enabled: true
      max-file-size: 1GB
      max-request-size: 1GB
      file-size-threshold: 0B

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
#        format_sql: true
#        highlight_sql: true

server:
  tomcat:
    max-http-form-post-size: -1
    max-swallow-size: -1
    max-part-count: -1

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:sqlite:./data/test.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1

  servlet:
    multipart:
      enabled: true
      max-file-size: 1GB
      max-request-size: 1GB
      file-size-threshold: 0B

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false

server:
  tomcat:
    max-http-form-post-size: -1
    max-swallow-size: -1
    max-part-count: -1

logging:
  level:
    root: info